name: Build
on:
  push:
    branches:
    - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - 
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4
      - 
        name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
